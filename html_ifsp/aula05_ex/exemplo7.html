<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula sobre tabelas: exemplo 7</title>
</head>
<body>
    <table>
        <caption>Vendas por mês</caption>

        <thead>
            <tr><th>Produtos</th> <th>JAN</th> <th>FEV</th> <th>MAR</th></tr>
        </thead>

        <body>
            <tr> <td>1</td> <td>20</td> <td>15</td> <td>25</td> </tr>
            <tr> <td>2</td> <td>10</td> <td>10</td> <td>5</td> </tr>
            <tr> <td>3</td> <td>5</td> <td>10</td> <td>15</td></tr>
        </body>

        <tfoot>
            <tr> <td>TOTAL</td> <td>35</td> <td>35</td> <td>45</td></tr>
        </tfoot>
    </table>
