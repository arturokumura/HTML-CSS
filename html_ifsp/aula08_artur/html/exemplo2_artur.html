<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 2</title>
    <link rel="stylesheet" href="../css/exemplo2.css">
</head>
<body>
    <div class="registration-form">
        <h1>Formulário <br> de Registros</h1>
        <form action="#" method="post">
            <p>Nome completo:</p>
            <input type="text" name="fullname" placeholder="Digite o nome completo">
            <p>Nome de usuário:</p>
            <input type="text" name="username" placeholder="Digite seu nome de usuário">
            <p>Email:</p>
            <input type="email" name="email" placeholder="Digite seu email">
            <p>Senha:</p>
            <input type="password" name="password" placeholder="Digite sua senha">
            <button type="submit">CADASTRAR</button>
        </form>
    </div>
</body>
</html>
