<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macarrão instantâneo</title>
</head>
<body>
    <h1><strong>Macarrão  instantâneo</strong></h1>
    <h2><strong>Modo de preparo</strong></h2>
    <ol type="c">
        <li>Ferver 600ml de água em uma panela.</li>
        <li>Retirar o macarrão do pacote.</li>
        <li>Colocar o macarrão na panela no fogo baixo.</li>
        <li>Cozinhar o macarrão por 3min.</li>
        <li>Temperar a gosto.</li>
    </ol>
</body>
</html>
